[toolchain]
# Pinned to the same line as ARG RUST_VERSION in the Dockerfile: local
# builds, CI and the container image must all compile with one compiler.
# llvm-tools backs cargo-llvm-cov (`just coverage`), locally and in CI.
channel    = "1.97"
components = ["clippy", "rustfmt", "llvm-tools-preview"]
profile    = "default"

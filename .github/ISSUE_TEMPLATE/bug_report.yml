name: Bug report
description: Something behaves incorrectly.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: The observed behavior, as precisely as possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What was expected
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Ideally a minimal sequence of requests or commands.
      placeholder: |
        1. `just db-up && just run`
        2. `curl http://127.0.0.1:8080/...`
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Output of `git rev-parse HEAD`, a release tag, or an image tag.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Trace output around the failure (secrets are redacted by design, but double-check).
      render: text

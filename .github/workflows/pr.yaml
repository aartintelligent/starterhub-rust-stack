# Pull request hygiene.
#
# Validates that the PR title is a Conventional Commit: with squash
# merges the title becomes the commit on main, and release-please
# computes versions and changelogs from those messages — a malformed
# title would corrupt the release pipeline (see CONTRIBUTING.md).
name: pr

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    name: conventional commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Same type list as CONTRIBUTING.md.
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            build
            ci
            chore

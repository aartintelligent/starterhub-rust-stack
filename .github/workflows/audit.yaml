# Security audit of the dependency tree against the RustSec advisory
# database.
#
# Dependabot keeps versions fresh; this workflow covers the opposite
# case — an advisory published for a version we already ship. Hence the
# weekly schedule on top of the manifest-change triggers.
name: audit

on:
  schedule:
    # Every Monday at 06:00 UTC, matching the Dependabot cadence.
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths: ["**/Cargo.toml", "Cargo.lock"]
  pull_request:
    paths: ["**/Cargo.toml", "Cargo.lock"]

# `issues: write` lets scheduled runs open an issue when a new advisory
# hits a pinned dependency.
permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

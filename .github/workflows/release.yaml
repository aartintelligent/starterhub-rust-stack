# Release artifacts.
#
# Builds the production image from the Dockerfile and pushes it to
# Docker Hub (docker.io/aartintelligent/starterhub-rust-stack).
#
# Two entry points, one job:
#   - The automatic chain: the release-please workflow dispatches this
#     one (tag + latest=true) right after tagging a release, so every
#     release ships its image with no human step.
#   - The manual dispatch: rebuild any past tag. It does NOT move
#     `latest` unless explicitly asked, so rebuilding an old version can
#     never repoint it backwards: `latest` follows the newest release
#     only.
#
# Dispatches run from main on purpose: a workflow_dispatch executes the
# workflow file as it exists at the dispatched ref, so dispatching on an
# old tag would resurrect an outdated workflow. Dispatching from main
# with the tag as input always uses the current workflow against the
# tagged sources.
#
# Caching strategy — two complementary layers, because the "default"
# runner group has many machines and a job may land on any of them:
#   1. Per machine: a NAMED persistent BuildKit builder (created
#      idempotently below). Its state volume outlives the job, so the
#      Dockerfile's RUN cache mounts (cargo registry, target/) are
#      reused on the next build on the same machine — the one thing no
#      remote cache backend can persist.
#   2. Across machines: image layers are exported to a registry cache
#      (the :buildcache tag on Docker Hub, mode=max), so a machine that
#      never built the project starts from the last build's layers
#      instead of from scratch.
#
# Notes:
#   - The build stage pulls Docker Hardened Images from dhi.io, an
#     authenticated registry. dhi.io authenticates with the Docker ID,
#     so the same DHI_USERNAME / DHI_PASSWORD secrets log in to both
#     dhi.io (pull) and docker.io (push); the token behind DHI_PASSWORD
#     therefore needs write access on the aartintelligent namespace.
#   - Releases created with the default GITHUB_TOKEN do not trigger
#     other workflows (GitHub loop protection) — which is why the
#     automatic path is a workflow_dispatch chained by the release-please
#     workflow: dispatch events are exempt from that protection. The
#     `release: published` trigger is kept so a release created with a
#     PAT or by hand still ships its image.
name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.2.0)"
        required: true
        type: string
      latest:
        description: "Also move the latest tag (the automatic release chain enables this; leave off when rebuilding an old tag)"
        required: false
        default: false
        type: boolean

# Read-only token: the image goes to Docker Hub, nothing is written on
# the GitHub side.
permissions:
  contents: read

# One release build at a time, never canceled: two overlapping builds (a
# release chased by a hotfix, or a manual rebuild racing the automatic
# chain) would race their writes to the :buildcache tag, and the older
# build finishing last could repoint `latest` backwards.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  image:
    name: build and push image
    # Organization self-hosted runners (group "default"; the group must
    # allow public repositories); the runner must provide a Docker
    # daemon with BuildKit (Docker Engine 23+). Self-hosted is safe HERE
    # and only here: this workflow never runs on pull requests — only on
    # maintainer events (release published, manual dispatch, the
    # release-please chain), so fork code can never reach these machines.
    runs-on: self-hosted
    steps:
      # Build the sources of the release tag, whichever event fired:
      # the input on manual runs, the release tag itself otherwise.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      # Idempotent: create the machine-local persistent builder on
      # first use, reuse it afterwards. A named docker-container
      # builder keeps its BuildKit state (RUN cache mounts included)
      # between jobs AND supports the registry cache exporter, which
      # the plain docker driver does not.
      - name: Create or reuse the persistent BuildKit builder
        run: |
          docker buildx inspect starterhub-rust-stack >/dev/null 2>&1 \
            || docker buildx create --name starterhub-rust-stack --driver docker-container --bootstrap

      - name: Log in to dhi.io (hardened base images)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_PASSWORD }}

      # No registry input: docker.io is the default. Same Docker ID as
      # the dhi.io login above.
      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_PASSWORD }}

      # Derives the image tags from the release tag (vX.Y.Z): the exact
      # version, the moving X.Y, and latest. `latest` only moves on a
      # real release event or when the dispatch explicitly asks for it
      # (the automatic chain does): a plain rebuild of an old tag never
      # repoints it backwards.
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        id: meta
        with:
          images: docker.io/aartintelligent/starterhub-rust-stack
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag || github.ref_name }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' || inputs.latest == true }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          builder: starterhub-rust-stack
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cross-machine layer cache on Docker Hub; mode=max also
          # exports the intermediate build-stage layers, not just the
          # final image ones. image-manifest packages the cache as a
          # regular OCI manifest, the format Docker Hub accepts.
          cache-from: type=registry,ref=docker.io/aartintelligent/starterhub-rust-stack:buildcache
          cache-to: type=registry,ref=docker.io/aartintelligent/starterhub-rust-stack:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

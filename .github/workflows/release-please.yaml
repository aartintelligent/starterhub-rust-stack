# Release automation.
#
# release-please parses the Conventional Commits history of main,
# maintains a release PR (version bump + changelog, driven by
# release-please-config.json and .release-please-manifest.json at the
# repository root) and tags the release when that PR is merged.
#
# When a release is actually created, the second step chains the
# `release` workflow (image build and push) through a workflow_dispatch:
# dispatch events are exempt from GitHub's loop protection on the
# default GITHUB_TOKEN, so the whole path — merge the release PR, tag,
# build, publish — is automatic and needs no personal access token.
#
# The action authenticates with RELEASE_PAT (the organization-level
# fine-grained PAT, see CONTRIBUTING.md) when present, so the release PR
# it opens triggers the `ci` workflow like any other PR. With the
# default GITHUB_TOKEN fallback everything still works, but GitHub's
# loop protection keeps CI from running on release PRs.
name: release-please

on:
  push:
    branches: [main]

# `actions: write` lets the chain step dispatch the release workflow.
permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    # GitHub-hosted runner (ships the `gh` CLI): the job is a handful of
    # API calls, not worth an organization machine. Only the image build
    # (the `release` workflow) stays on the self-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      # Ship the image of the release that was just tagged. `latest=true`
      # because this path only ever runs for the newest release; manual
      # rebuilds of old tags go through the same workflow without it.
      # GH_REPO is required: this job never checks out the repository.
      - name: Build and publish the release image
        if: steps.release.outputs.release_created == 'true'
        run: gh workflow run release.yaml -f tag="$TAG" -f latest=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.release.outputs.tag_name }}

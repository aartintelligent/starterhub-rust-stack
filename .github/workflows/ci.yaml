# Continuous integration.
#
# Two jobs:
#   - gate: runs `just ci`, i.e. exactly the local quality gate
#     (fmt-check, clippy with -D warnings, tests): CI and the developer
#     machine can never disagree on what "green" means.
#   - coverage: measures test coverage (cargo-llvm-cov) and uploads it to
#     Codecov; thresholds and PR-comment behavior live in codecov.yml.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# Read-only token: this workflow only builds and tests.
permissions:
  contents: read

# One run per ref: a new push cancels the previous run on branches, but
# never on main so its history of results stays complete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  gate:
    name: quality gate
    # GitHub-hosted runner, never self-hosted: this workflow runs on
    # fork PRs, and code from a fork must never execute on the
    # organization's machines. Free and unlimited on a public repository.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # rustup reads rust-toolchain.toml, so the exact pinned compiler
      # (channel + clippy + rustfmt) is installed — never "whatever
      # stable the runner ships". Self-hosted runners are not guaranteed
      # to ship rustup, so bootstrap it idempotently first.
      - name: Install the pinned toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup toolchain install

      # Cache ~/.cargo and target/ keyed on the lockfile and toolchain.
      - uses: Swatinem/rust-cache@v2

      # `just` is the single entry point for every recipe, in CI as
      # locally.
      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Run the quality gate
        run: just ci

  coverage:
    name: coverage
    # GitHub-hosted runner, same fork-safety rationale as the gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Same idempotent bootstrap as the gate; the llvm-tools component
      # comes from rust-toolchain.toml like the rest of the toolchain.
      - name: Install the pinned toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup toolchain install

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-llvm-cov

      - name: Build the coverage report
        run: just coverage-lcov

      # Internal branches authenticate with the CODECOV_TOKEN repository
      # secret; fork PRs run without secrets, and the action then falls
      # back to tokenless uploads, which Codecov accepts for public
      # repositories. A failed upload fails the job: a silent failure
      # would freeze the reported coverage and hide regressions behind a
      # stale number.
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true

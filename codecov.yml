# ─────────────────────────────────────────────────────────────────────────────
#  Codecov — thresholds and PR-comment behavior for the upload performed by
#  the `coverage` job in .github/workflows/ci.yaml. The repository is
#  private, so the upload authenticates with the CODECOV_TOKEN secret.
# ─────────────────────────────────────────────────────────────────────────────
coverage:
  status:
    # Overall project coverage may drift down by at most 1% per PR.
    project:
      default:
        target: auto
        threshold: 1%
    # Patch coverage is reported but never blocks a PR — early-stage
    # template, the signal matters more than the gate.
    patch:
      default:
        informational: true

comment:
  layout: "condensed_header, diff, files"
  behavior: default
  require_changes: true

# Binary entry points: their process wiring (signal handlers, CLI
# delegation) is only exercised by running the real program, and the
# logic they call lives in the tested library crates. Kept in sync with
# the exclusion in the justfile coverage recipes.
ignore:
  - "src/main.rs"
  - "migration/src/main.rs"
